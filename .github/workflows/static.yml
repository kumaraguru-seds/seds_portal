name: 🌐 Deploy Web (on main push)

on:
  push:
    branches:
      - main       # Redeploys the website every time you push to main
    paths-ignore:
      - '**.md'
      - '.gitignore'

env:
  FLUTTER_VERSION: '3.44.6'   # Matches the locally installed Flutter version

jobs:
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web release
        run: flutter build web --release --base-href="/"

      - name: Add CNAME for custom domain
        run: echo "webportal.kumaraguruseds.space" > build/web/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          cname: webportal.kumaraguruseds.space
          commit_message: "deploy: web update from ${{ github.sha }}"
